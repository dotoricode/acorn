# acorn npm publish with sigstore provenance
#
# §15 HIGH-2 / ADR-020 (v0.4.0): tag `v*.*.*` push 시 npm publish --provenance.
# GitHub Actions OIDC 로 서명 발행 → 사용자는 `npm audit signatures` 또는
# `npm view @dotoricode/acorn --provenance` 로 "이 tarball 이 이 repo 의 이 commit
# 에서 빌드됨" 을 검증 가능.
#
# 수동 `npm publish` 는 금지 (CONTRIBUTING / README 명기). 계정 탈취 시 공격
# 표면을 repo commit 권한까지로 격상 (2-hop) 하는 게 목적.
#
# 활성화 조건: npm 에 @dotoricode/acorn 패키지가 존재 + NPM_TOKEN 은 publish
# 권한 없는 read-only 로만 유지 (OIDC 경로와 분리). 첫 publish 전 npm 2FA /
# access public 등 계정 설정 확인 필요.

name: Publish

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # sigstore provenance 서명에 필요

jobs:
  publish:
    name: Publish to npm with provenance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: CLI smoke
        run: node dist/index.js --version

      - name: Pack dry-run (files 화이트리스트 검증)
        # v0.3.1 CRIT-1: src/**/*.ts, tests, internal docs 등이 유출되지 않는지
        # 매 release 마다 재확인. 기대: dist/**, hooks/*, templates/*, scripts/
        # install-shim-windows.sh, docs/USAGE.md, README, LICENSE 만.
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
